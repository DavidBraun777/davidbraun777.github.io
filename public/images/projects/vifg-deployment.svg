  <text x="470" y="422" fill="#F8FAFC" font-family="monospace" font-size="20">Dockerized React/Vite app</text>
  <text x="470" y="450" fill="#94A3B8" font-family="monospace" font-size="15">served behind localhost Nginx</text>

